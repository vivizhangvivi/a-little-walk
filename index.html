<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="A Little Walk">
<meta name="theme-color" content="#FBF6E9">
<title>A Little Walk · 小狗散步日记</title>
<style>
  :root{
    --bg:#FBF6E9; --card:#FFFDF6; --ink:#4a463f; --soft:#9b958a;
    --line:#e7e0cf; --accent:#7fae6e; --yellow:#fbe7a1; --dark:#3a3733;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* header */
  header{
    position:sticky; top:0; z-index:5;
    background:var(--yellow);
    padding:calc(env(safe-area-inset-top) + 14px) 20px 14px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom-left-radius:18px; border-bottom-right-radius:18px;
  }
  .menu-btn{font-size:22px; line-height:1; background:none; border:none; color:var(--ink); padding:6px; cursor:pointer;}
  .title{font-size:15px; font-weight:600; letter-spacing:.3px; opacity:.85;}
  .paw{font-size:20px;}

  /* timeline */
  main{padding:8px 18px 120px; max-width:560px; margin:0 auto;}
  .year{ text-align:center; color:var(--soft); font-size:13px; margin:26px 0 14px;
    display:flex; align-items:center; gap:12px;}
  .year::before,.year::after{content:""; flex:1; height:1px; background:var(--line);}

  .entry{ position:relative; padding-left:22px; margin-bottom:22px;}
  .entry::before{ content:""; position:absolute; left:4px; top:6px; width:9px;height:9px;
    border-radius:50%; background:var(--bg); border:2px solid var(--accent);}
  .entry::after{ content:""; position:absolute; left:8px; top:20px; bottom:-22px; width:0;
    border-left:2px dotted var(--line);}
  .entry:last-child::after{display:none;}
  .date{font-size:13px; color:var(--soft); margin-bottom:8px;}
  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px 16px 14px; box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .meta{font-size:12px; color:var(--soft); margin-bottom:8px; display:flex; gap:10px; flex-wrap:wrap;}
  .text{font-size:16px; line-height:1.7; white-space:pre-wrap; word-break:break-word;}
  .photo{margin-top:12px; width:100%; border-radius:12px; display:block;}

  /* empty */
  .empty{ text-align:center; color:var(--soft); padding:90px 30px;}
  .empty .big{font-size:46px; margin-bottom:14px;}
  .empty p{font-size:15px; line-height:1.7; margin:4px 0;}

  /* FAB */
  .fab{ position:fixed; right:22px; bottom:calc(26px + env(safe-area-inset-bottom));
    width:62px;height:62px;border-radius:50%; background:var(--dark); color:#fff;
    border:none; font-size:26px; box-shadow:0 6px 18px rgba(0,0,0,.22);
    display:flex;align-items:center;justify-content:center; cursor:pointer; z-index:8;}
  .fab:active{transform:scale(.94);}

  /* sheet */
  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,.32); z-index:20;
    opacity:0; pointer-events:none; transition:opacity .22s;}
  .scrim.show{opacity:1; pointer-events:auto;}
  .sheet{ position:fixed; left:0;right:0;bottom:0; z-index:21;
    background:var(--bg); border-top-left-radius:22px;border-top-right-radius:22px;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.8,.2,1);
    max-width:560px; margin:0 auto;}
  .sheet.show{transform:translateY(0);}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 16px;}
  .sheet h2{font-size:17px;margin:0 0 14px;font-weight:600;}
  textarea{ width:100%; min-height:120px; resize:none; border:1px solid var(--line);
    border-radius:14px; padding:14px; font-size:16px; line-height:1.7; background:var(--card);
    font-family:inherit; color:var(--ink);}
  textarea:focus{outline:none;border-color:var(--accent);}
  .row{display:flex; gap:10px; align-items:center; margin-top:14px;}
  .chip{ border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:11px 14px; font-size:14px; color:var(--ink); cursor:pointer; display:flex; gap:7px; align-items:center;}
  .chip input{display:none;}
  .dur{ width:70px; text-align:center; border:1px solid var(--line); border-radius:12px;
    padding:11px 8px; font-size:14px; background:var(--card); font-family:inherit; color:var(--ink);}
  .preview{position:relative; margin-top:12px; display:none;}
  .preview img{width:100%; border-radius:12px; display:block;}
  .preview .x{position:absolute; top:8px; right:8px; background:rgba(0,0,0,.55); color:#fff;
    border:none; width:28px;height:28px;border-radius:50%; font-size:15px; cursor:pointer;}
  .actions{display:flex; gap:12px; margin-top:18px;}
  .btn{flex:1; padding:15px; border-radius:14px; font-size:16px; border:none; cursor:pointer; font-family:inherit;}
  .btn.cancel{background:var(--card); border:1px solid var(--line); color:var(--soft);}
  .btn.save{background:var(--accent); color:#fff; font-weight:600;}
  .btn.save:disabled{opacity:.45;}
</style>
</head>
<body>
  <header>
    <button class="menu-btn" id="menu" aria-label="menu">☰</button>
    <div class="title">A Little Walk</div>
    <div class="paw">🐾</div>
  </header>

  <main id="list"></main>

  <button class="fab" id="fab" aria-label="记录这次散步">✏️</button>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <h2 id="sheetTitle">和 bonbon 的散步</h2>
    <textarea id="text" placeholder="今天散步发生了什么？写一两句就好…"></textarea>
    <div class="row">
      <label class="chip">
        📷 加张照片
        <input type="file" id="photoInput" accept="image/*">
      </label>
      <input class="dur" id="dur" type="number" inputmode="numeric" placeholder="分钟" min="0">
      <span style="font-size:13px;color:var(--soft)">时长(可不填)</span>
    </div>
    <div class="preview" id="preview"><button class="x" id="rmPhoto">✕</button><img id="previewImg"></div>
    <div class="actions">
      <button class="btn cancel" id="cancel">取消</button>
      <button class="btn save" id="save">保存</button>
    </div>
  </div>

<script>
const KEY='alw_entries_v1', DOGKEY='alw_dog';
let dog = localStorage.getItem(DOGKEY) || 'bonbon';
let pendingPhoto = null;

const $=id=>document.getElementById(id);
const load=()=>{ try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} };
const store=arr=>localStorage.setItem(KEY, JSON.stringify(arr));

function fmtDate(ts){const d=new Date(ts);return `${d.getMonth()+1}月${d.getDate()}日`;}
function fmtYear(ts){return new Date(ts).getFullYear();}

function render(){
  const list=$('list');
  const items=load().sort((a,b)=>b.ts-a.ts);
  if(!items.length){
    list.innerHTML=`<div class="empty"><div class="big">🐾</div>
      <p>还没有散步记录</p>
      <p>点右下角，<br>和 ${dog} 去走走吧～</p></div>`;
    return;
  }
  let html='', lastYear=null;
  for(const it of items){
    const y=fmtYear(it.ts);
    if(lastYear!==null && y!==lastYear) html+=`<div class="year">${y}年</div>`;
    lastYear=y;
    const meta=[];
    if(it.dur) meta.push('🚶 '+it.dur+' 分钟');
    html+=`<div class="entry"><div class="date">${fmtDate(it.ts)}</div>
      <div class="card">
        ${meta.length?`<div class="meta">${meta.join('')}</div>`:''}
        <div class="text">${escapeHtml(it.text)}</div>
        ${it.photo?`<img class="photo" src="${it.photo}">`:''}
      </div></div>`;
  }
  list.innerHTML=html;
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* sheet */
function openSheet(){
  $('sheetTitle').textContent=`和 ${dog} 的散步`;
  $('scrim').classList.add('show'); $('sheet').classList.add('show');
  setTimeout(()=>$('text').focus(),200);
}
function closeSheet(){
  $('scrim').classList.remove('show'); $('sheet').classList.remove('show');
  $('text').value=''; $('dur').value=''; clearPhoto();
}
function clearPhoto(){ pendingPhoto=null; $('preview').style.display='none'; $('photoInput').value=''; }

$('fab').onclick=openSheet;
$('cancel').onclick=closeSheet;
$('scrim').onclick=closeSheet;
$('rmPhoto').onclick=clearPhoto;

$('photoInput').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const max=1100; let w=img.width,h=img.height;
      if(w>h&&w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
      const c=document.createElement('canvas'); c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhoto=c.toDataURL('image/jpeg',0.72);
      $('previewImg').src=pendingPhoto; $('preview').style.display='block';
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
};

$('save').onclick=()=>{
  const text=$('text').value.trim();
  if(!text && !pendingPhoto){ closeSheet(); return; }
  const dur=parseInt($('dur').value)||0;
  const arr=load();
  arr.push({ id:Date.now()+'-'+Math.floor(Math.random()*1000), ts:Date.now(),
    text, dur, photo:pendingPhoto });
  try{ store(arr); }
  catch(err){ alert('照片太多啦，存不下了～这条先不带照片试试'); return; }
  closeSheet(); render();
};

/* menu — set dog name */
$('menu').onclick=()=>{
  const n=prompt('你的狗狗叫什么？',dog);
  if(n && n.trim()){ dog=n.trim(); localStorage.setItem(DOGKEY,dog); render(); }
};

render();
</script>
</body>
</html>
