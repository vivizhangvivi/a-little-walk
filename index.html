<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="A Little Walk">
<meta name="theme-color" content="#FFF2C8">
<title>A Little Walk · 小狗散步日记</title>
<style>
  @font-face{font-family:'AnonymousPro';src:url('assets/fonts/anonymous-pro-700.woff2') format('woff2');font-weight:700;font-display:swap;}
  @font-face{font-family:'Jason';src:url('assets/fonts/JasonHandwriting9.ttf') format('truetype');font-display:swap;}
  @font-face{font-family:'Mincho';src:url('assets/fonts/huiwen-mincho.ttf') format('truetype');font-display:swap;}

  :root{
    --bg:#FFF2C8; --card:#FFFFFF; --pen:#1F724B; --ink:#38624A; --soft:#7C9484; --line:#EFE6BE;
    --pink:#F8A0B8; --wd-bg:#EEF4DB; --dark:#2C4A37;
    --hand:'Jason','PingFang SC',sans-serif;
    --serif:'Mincho','Songti SC',serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{ background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif; -webkit-font-smoothing:antialiased;}
  .view{display:none;} .view.active{display:block; min-height:100vh;}

  /* ---------- HOME ---------- */
  header{ position:sticky; top:0; z-index:5; background:var(--bg);
    padding:calc(env(safe-area-inset-top) + 16px) 22px 6px;
    display:flex; align-items:center; justify-content:space-between;}
  .ic{ background:none; border:none; padding:4px; cursor:pointer; display:flex; align-items:center;}
  .ic.poop img{height:26px;} .ic.cal img{height:31px;}
  .title{ font-family:'AnonymousPro',monospace; font-weight:700; font-size:22px;
    letter-spacing:1.5px; color:var(--pen);}

  main{padding:22px 34px 120px; max-width:520px; margin:0 auto;}

  /* hero: 绝对定位, 坐标直接取自 Figma Dev Mode (402宽画框) */
  .hero{ position:relative; width:100%; max-width:402px; margin:2px auto 0; height:146px;}
  .hero img.today{ position:absolute; left:19px; top:2px; height:51px;}
  .hero img.num{ position:absolute; left:189px; top:0; height:36px;}
  .hero img.mins{ position:absolute; left:291px; top:9px; height:30px;}
  .hero-dog{ position:absolute; left:171px; top:79px; cursor:pointer;}
  .hero-dog img{ height:62px; display:block; transform-origin:50% 90%; animation:sway 3.4s ease-in-out infinite;}
  .hero-dog:active img{transform:scale(.95);}
  @keyframes sway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}

  /* day head — 7/10 是 16px 明朝体, 周几圈 11px */
  .day{ margin-bottom:0;}
  .day-head{ display:flex; align-items:center; gap:6px; margin:14px 0 4px;}
  .day-date{ font-family:var(--serif); font-size:16px; color:var(--pen);}
  .day-wd{ font-family:var(--serif); width:11px;height:11px;border-radius:50%; background:var(--wd-bg); color:var(--pen);
    font-size:9px; line-height:1; display:inline-flex;align-items:center;justify-content:center;}

  .year{ text-align:center; color:var(--soft); font-size:13px; margin:22px 0 12px; display:flex; align-items:center; gap:12px;}
  .year::before,.year::after{content:""; flex:1; height:1px; background:var(--line);}

  /* record card — radius 10, dot 10.5, photo 69²square (来自 Dev Mode) */
  .rec{ position:relative; background:var(--card); border-radius:10px;
    display:flex; align-items:flex-start; gap:12px; padding:11px 13px 11px 15px; margin-bottom:4px; cursor:pointer;}
  .rec .dot{ position:absolute; left:-5px; top:15px; width:10.5px;height:10.5px; z-index:1;}
  .rec-l{ flex:1; min-width:0; display:flex; flex-direction:column;}
  .rec .meta{ font-family:var(--serif); font-size:13px; color:var(--pen);
    display:flex; gap:10px; align-items:baseline; white-space:nowrap; overflow:hidden; margin-bottom:6px;}
  .rec .meta .t{}
  .rec .text{ font-family:var(--hand); font-size:16px; line-height:18px; letter-spacing:-0.08em; color:var(--ink);
    white-space:pre-wrap; word-break:break-word;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .rec .text .lat{ letter-spacing:0; }   /* 英文/数字片段: 字距归零 */
  .rec .thumb{ width:69px; height:69px; align-self:flex-start; object-fit:cover; border-radius:10px; flex-shrink:0; background:var(--wd-bg);}

  .empty-state{ text-align:center; color:var(--soft); padding:40px 30px; font-family:var(--hand);}
  .empty-state img{height:88px; margin-bottom:14px;}
  .empty-state p{font-size:17px; line-height:1.7; margin:4px 0;}

  .pill{ position:fixed; right:22px; bottom:calc(26px + env(safe-area-inset-bottom));
    background:var(--pen); color:#fff; border:none; border-radius:30px; padding:15px 22px;
    font-size:16px; font-weight:600; box-shadow:0 6px 18px rgba(0,0,0,.18);
    display:none; align-items:center; gap:10px; cursor:pointer; z-index:8; font-variant-numeric:tabular-nums;}
  .pill .pdot{width:9px;height:9px;border-radius:50%;background:#fff;animation:blink 1.4s infinite;}
  @keyframes blink{50%{opacity:.3;}}

  /* ---------- TIMER ---------- */
  #timer{background:var(--bg); flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 30px calc(60px + env(safe-area-inset-bottom));}
  #timer.active{display:flex;}
  .timer-dog img{height:120px; margin-bottom:14px;}
  .timer-hint{color:var(--pen); font-size:16px; margin-bottom:30px; line-height:1.7; font-family:var(--hand);}
  .timer-clock{font-size:60px; font-weight:300; letter-spacing:1px; font-variant-numeric:tabular-nums; margin-bottom:8px; color:var(--pen);}
  .timer-start{color:var(--soft); font-size:13px; margin-bottom:48px;}
  .btn-end{ background:var(--pen); color:#fff; border:none; border-radius:18px; padding:18px 0;
    width:100%; max-width:300px; font-size:17px; font-weight:600; cursor:pointer; font-family:inherit;}
  .btn-cancel{ background:none; border:none; color:var(--soft); font-size:14px; margin-top:20px; cursor:pointer;}

  /* ---------- DETAIL ---------- */
  .topbar{ position:sticky; top:0; background:var(--bg); z-index:5;
    padding:calc(env(safe-area-inset-top) + 12px) 18px 12px; display:flex; align-items:center;}
  .back{font-size:16px; background:none;border:none;color:var(--pen); cursor:pointer; padding:6px;}
  .detail-body{padding:12px 24px calc(40px + env(safe-area-inset-bottom)); max-width:520px; margin:0 auto;}
  .witness{ text-align:center; padding:14px 10px 22px;}
  .witness .w-icon img{ height:70px; margin:0 auto 14px;}
  .witness .w-line{font-size:21px; line-height:1.5; font-family:var(--hand); color:var(--pen);}
  .witness .w-sub{font-size:14px; color:var(--soft); margin-top:8px; font-family:var(--hand);}
  .detail-date{font-family:var(--serif); font-size:22px; font-weight:700; color:var(--pen); margin-bottom:6px;}
  .detail-meta{font-family:var(--serif); font-size:13.5px; color:var(--pen); margin-bottom:18px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  .label{font-size:13px; color:var(--soft); margin:18px 0 8px;}
  .chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{ border:1px solid var(--line); background:var(--card); border-radius:12px; padding:9px 13px;
    font-size:15px; color:var(--ink); cursor:pointer; display:inline-flex; gap:6px; align-items:center; user-select:none;}
  .chip.sel{ border-color:var(--pen); background:var(--wd-bg);}
  .chip.wx{font-size:20px; padding:7px 12px;}
  .chip input{display:none;}
  .place-input{ width:100%; margin-top:8px; border:1px solid var(--line); border-radius:12px;
    padding:11px 13px; font-size:15px; background:var(--card); font-family:inherit; color:var(--ink);}
  textarea{ width:100%; min-height:110px; resize:none; border:1px solid var(--line); border-radius:14px;
    padding:14px; font-size:17px; line-height:1.7; background:var(--card); font-family:var(--hand); color:var(--ink); margin-top:8px;}
  textarea:focus,.place-input:focus{outline:none;border-color:var(--pen);}
  .photo-full{width:100%; border-radius:14px; margin-top:12px; display:none;}
  .save-btn{ width:100%; margin-top:24px; padding:16px; border-radius:14px; border:none;
    background:var(--pen); color:#fff; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit;}
  .minor-btn{ width:100%; margin-top:12px; padding:12px; border:none; background:none; font-size:14px; cursor:pointer; font-family:inherit;}
  .share-btn{color:var(--soft);} .del-btn{color:#c98b8b;}

  /* ---------- CALENDAR ---------- */
  #cal .detail-body{padding-top:10px;}
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin:6px 0 16px;}
  .cal-nav button{background:none;border:none;font-size:20px;color:var(--pen);cursor:pointer;padding:6px 12px;}
  .cal-title{font-family:var(--serif); font-size:18px; font-weight:700; color:var(--pen);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center;}
  .cal-wd{font-size:12px; color:var(--soft); padding:6px 0;}
  .cal-day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:14px;
    border-radius:50%; color:var(--ink); position:relative;}
  .cal-day.empty{color:transparent;}
  .cal-day.walked{ background:var(--pen); color:#fff; font-weight:600; cursor:pointer;}
  .cal-day.today{ outline:2px solid var(--pen);}
  .cal-list{margin-top:22px;}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home" class="view active">
  <header>
    <button class="ic poop" id="menu" aria-label="狗狗名字"><img src="assets/poop.svg" alt=""></button>
    <div class="title">A Little Walk</div>
    <button class="ic cal" id="calBtn" aria-label="日历"><img src="assets/cal.svg" alt=""></button>
  </header>
  <div class="hero">
    <img class="today" src="assets/today.svg" alt="Today">
    <img class="num" src="assets/num.svg" alt="42">
    <img class="mins" src="assets/mins.svg" alt="mins">
    <div class="hero-dog" id="startDog" aria-label="开始散步"><img src="assets/dog.svg" alt=""></div>
  </div>
  <main>
    <div id="list"></div>
  </main>
  <button class="pill" id="pill"><span class="pdot"></span><span id="pillTime">00:00</span> 散步中</button>
</div>

<!-- ===== TIMER ===== -->
<div id="timer" class="view">
  <div class="timer-dog"><img src="assets/dog.svg" alt=""></div>
  <div class="timer-hint">和 <span class="dogname">bonbon</span> 散步中…<br>把手机收起来，回到当下吧</div>
  <div class="timer-clock" id="clock">00:00</div>
  <div class="timer-start" id="startedAt"></div>
  <button class="btn-end" id="endWalk">结束散步</button>
  <button class="btn-cancel" id="cancelWalk">取消这次</button>
</div>

<!-- ===== DETAIL / SUMMARY ===== -->
<div id="detail" class="view">
  <div class="topbar"><button class="back" id="back">‹ 返回</button></div>
  <div class="detail-body">
    <div class="witness" id="witness" style="display:none">
      <div class="w-icon"><img src="assets/dog.svg" alt=""></div>
      <div class="w-line" id="wLine"></div>
      <div class="w-sub">慢慢来，给 <span class="dogname">bonbon</span> 擦完脚再回来写也行～</div>
    </div>
    <div id="dHead">
      <div class="detail-date" id="dDate"></div>
      <div class="detail-meta" id="dMeta"></div>
    </div>
    <div class="label">天气</div>
    <div class="chips" id="wxChips"></div>
    <div class="label">地点</div>
    <div class="chips" id="placeChips"></div>
    <input class="place-input" id="placeInput" maxlength="14" placeholder="或自己写（如：流花湖公园）">
    <div class="label">这次散步</div>
    <textarea id="dText" placeholder="发现了什么？写一两句…不写也没关系"></textarea>
    <label class="chip" style="margin-top:12px">📷 <span id="photoLabel">加照片</span>
      <input type="file" id="photoInput" accept="image/*"></label>
    <img class="photo-full" id="dPhoto">
    <button class="save-btn" id="save">保存</button>
    <button class="minor-btn share-btn" id="share">分享这天（设计中）</button>
    <button class="minor-btn del-btn" id="del">删除这条记录</button>
  </div>
</div>

<!-- ===== CALENDAR ===== -->
<div id="cal" class="view">
  <div class="topbar"><button class="back" id="calBack">‹ 返回</button></div>
  <div class="detail-body">
    <div class="cal-nav"><button id="calPrev">‹</button><div class="cal-title" id="calTitle"></div><button id="calNext">›</button></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-list" id="calList"></div>
  </div>
</div>

<script>
const KEY='alw_entries_v1', DOGKEY='alw_dog', ACTIVEKEY='alw_active';
const WX={sunny:'☀️',cloudy:'☁️',rain:'🌧️',snow:'❄️'};
const WXLABEL={sunny:'晴',cloudy:'阴',rain:'雨',snow:'雪'};
const PLACES=['公园','地库','小区','河边'];
const WD=['周日','周一','周二','周三','周四','周五','周六'];
const WD1=['日','一','二','三','四','五','六'];
let dog=localStorage.getItem(DOGKEY)||'bonbon';
let editingId=null, pendingPhoto, selWeather=null, tick=null;
let calY,calM;

const $=id=>document.getElementById(id);
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}};
const store=a=>localStorage.setItem(KEY,JSON.stringify(a));
const pad=n=>String(n).padStart(2,'0');
const startOf=e=>e.startTs||e.ts;
const fmtClock=ts=>{const d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes());};
const fmtDate=ts=>{const d=new Date(ts);return `${d.getMonth()+1}月${d.getDate()}日`;};
const wd=ts=>WD[new Date(ts).getDay()];
const yr=ts=>new Date(ts).getFullYear();
const durMin=e=>{const s=e.durationSec!=null?e.durationSec:(e.dur||0)*60;return Math.max(1,Math.round(s/60));};
function fmtElapsed(sec){const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return (h?pad(h)+':':'')+pad(m)+':'+pad(s);}
function sameDay(ts,d){const a=new Date(ts);return a.getFullYear()===d.getFullYear()&&a.getMonth()===d.getMonth()&&a.getDate()===d.getDate();}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
/* 中文字距 -8%, 但英文/数字片段字距归零(否则挤成一团) */
function wrapLat(raw){return raw.replace(/[A-Za-z0-9][A-Za-z0-9'’.\-]*|[^A-Za-z0-9]+/g,seg=>{
  const e=esc(seg);return /^[A-Za-z0-9]/.test(seg)?`<span class="lat">${e}</span>`:e;});}
function defaultText(e){return `今天和 ${dog} 一起，好好走了 ${durMin(e)} 分钟 🐾`;}
function warmLine(e){return `今天，你和 ${dog} 一起好好走了 ${durMin(e)} 分钟。`;}
/* 时段圆点：9点前橙(morning) / 9-17绿(day) / 17后蓝黑(evening) */
function dotClass(ts){const h=new Date(ts).getHours();return h<9?'morning':(h<17?'day':'evening');}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0);}
function setDog(){document.querySelectorAll('.dogname').forEach(el=>el.textContent=dog);}

function recHtml(it){
  const st=startOf(it);
  const parts=[`<span class="t">${fmtClock(st)} 出门</span>`];
  if(it.weather&&WXLABEL[it.weather])parts.push(`<span>${WXLABEL[it.weather]}</span>`);
  if(it.place)parts.push(`<span>${esc(it.place)}</span>`);
  parts.push(`<span>${durMin(it)}min</span>`);
  parts.push(`<span>*km</span>`);
  const txt=wrapLat(it.text&&it.text.trim()?it.text:defaultText(it));
  return `<div class="rec" data-id="${it.id}">
    <img class="dot" src="assets/dot-${dotClass(st)}.svg" alt="">
    <div class="rec-l"><div class="meta">${parts.join('')}</div><div class="text">${txt}</div></div>
    ${it.photo?`<img class="thumb" src="${it.photo}">`:''}</div>`;
}

/* ---------- HOME ---------- */
function dayKey(ts){const d=new Date(ts);return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function byDayDescTimeAsc(a,b){const k=dayKey(startOf(b))-dayKey(startOf(a));return k!==0?k:startOf(a)-startOf(b);}
function renderHome(){
  const items=load().sort(byDayDescTimeAsc);
  const list=$('list');
  if(!items.length){
    list.innerHTML=`<div class="empty-state"><img src="assets/dog.svg" alt=""><p>还没有散步记录</p><p>点上面的小狗，和 ${esc(dog)} 去走走吧～</p></div>`;
  }else{
    let html='', lastKey=null, lastYear=null, open=false;
    for(const it of items){
      const st=startOf(it), d=new Date(st);
      const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`, y=d.getFullYear();
      if(key!==lastKey){
        if(open)html+=`</div></div>`;
        if(lastYear!==null&&y!==lastYear)html+=`<div class="year">${y}年</div>`;
        lastYear=y; lastKey=key; open=true;
        html+=`<div class="day"><div class="day-head"><span class="day-date">${d.getMonth()+1}/${d.getDate()}</span><span class="day-wd">${WD1[d.getDay()]}</span></div><div class="day-entries">`;
      }
      html+=recHtml(it);
    }
    if(open)html+=`</div></div>`;
    list.innerHTML=html;
    list.querySelectorAll('.rec').forEach(c=>c.onclick=()=>openDetail(c.dataset.id,false));
  }
  const act=getActive();
  $('pill').style.display=act?'flex':'none';
}

/* ---------- TIMER ---------- */
function getActive(){try{return JSON.parse(localStorage.getItem(ACTIVEKEY))}catch(e){return null}}
function startWalk(){localStorage.setItem(ACTIVEKEY,JSON.stringify({startTs:Date.now()}));openTimer();}
function openTimer(){const a=getActive();if(!a){renderHome();showView('home');return;}
  $('startedAt').textContent='出门 '+fmtClock(a.startTs);setDog();showView('timer');updateClock();
  clearInterval(tick);tick=setInterval(updateClock,1000);}
function updateClock(){const a=getActive();if(!a){clearInterval(tick);return;}
  const t=fmtElapsed(Math.floor((Date.now()-a.startTs)/1000));$('clock').textContent=t;$('pillTime').textContent=t;}
function endWalk(){const a=getActive();if(!a)return;clearInterval(tick);
  const durationSec=Math.max(1,Math.floor((Date.now()-a.startTs)/1000));const id=String(a.startTs);
  const arr=load();arr.push({id,startTs:a.startTs,durationSec,text:'',photo:null,weather:null,place:null});store(arr);
  localStorage.removeItem(ACTIVEKEY);renderHome();openDetail(id,true);}
function cancelWalk(){clearInterval(tick);localStorage.removeItem(ACTIVEKEY);renderHome();showView('home');}

/* ---------- DETAIL / SUMMARY ---------- */
function buildChips(){
  $('wxChips').innerHTML=Object.keys(WX).map(k=>`<div class="chip wx" data-w="${k}" title="${WXLABEL[k]}">${WX[k]}</div>`).join('');
  $('wxChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{const k=c.dataset.w;selWeather=(selWeather===k?null:k);
    $('wxChips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',x.dataset.w===selWeather));});
  $('placeChips').innerHTML=PLACES.map(p=>`<div class="chip" data-p="${p}">${p}</div>`).join('');
  $('placeChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{$('placeInput').value=c.dataset.p;syncPlaceChips();});
}
function syncPlaceChips(){const v=$('placeInput').value.trim();$('placeChips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',x.dataset.p===v));}
function openDetail(id,fresh){
  const e=load().find(x=>x.id===id);if(!e)return;
  editingId=id;pendingPhoto=undefined;selWeather=e.weather||null;
  const st=startOf(e);
  $('witness').style.display=fresh?'block':'none';$('dHead').style.display=fresh?'none':'block';
  if(fresh)$('wLine').textContent=warmLine(e);
  $('dDate').innerHTML=`${fmtDate(st)} <span style="color:var(--soft);font-weight:400">${wd(st)}</span>`;
  $('dMeta').innerHTML=`${fmtClock(st)} 出门 · ${durMin(e)} 分钟`;
  $('wxChips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',x.dataset.w===selWeather));
  $('placeInput').value=e.place||'';syncPlaceChips();
  $('dText').value=e.text||'';
  if(e.photo){$('dPhoto').src=e.photo;$('dPhoto').style.display='block';$('photoLabel').textContent='换照片';}
  else{$('dPhoto').style.display='none';$('photoLabel').textContent='加照片';}
  $('photoInput').value='';$('del').style.display=fresh?'none':'block';
  setDog();showView('detail');
}
function saveDetail(){
  const arr=load();const e=arr.find(x=>x.id===editingId);if(!e){showView('home');return;}
  e.text=$('dText').value.trim();e.weather=selWeather;e.place=$('placeInput').value.trim()||null;
  if(pendingPhoto!==undefined)e.photo=pendingPhoto;
  try{store(arr);}catch(err){alert('照片太多，本地存不下了～这条先不带照片');e.photo=null;store(arr);}
  renderHome();showView('home');
}
function delDetail(){if(!confirm('删除这条散步记录？'))return;store(load().filter(x=>x.id!==editingId));renderHome();showView('home');}

$('photoInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{const max=900;let w=img.width,h=img.height;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    pendingPhoto=c.toDataURL('image/jpeg',0.7);$('dPhoto').src=pendingPhoto;$('dPhoto').style.display='block';$('photoLabel').textContent='换照片';};
    img.src=ev.target.result;};r.readAsDataURL(f);};

/* ---------- CALENDAR ---------- */
function openCal(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();showView('cal');}
function renderCal(){
  $('calTitle').textContent=`${calY}年${calM+1}月`;
  const byDay={};load().forEach(e=>{const d=new Date(startOf(e));byDay[`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`]=true;});
  const first=new Date(calY,calM,1).getDay(), days=new Date(calY,calM+1,0).getDate(), today=new Date();
  let g=WD1.map(w=>`<div class="cal-wd">${w}</div>`).join('');
  for(let i=0;i<first;i++)g+=`<div class="cal-day empty">.</div>`;
  for(let d=1;d<=days;d++){
    const walked=byDay[`${calY}-${calM}-${d}`], isToday=sameDay(new Date(calY,calM,d).getTime(),today);
    g+=`<div class="cal-day ${walked?'walked':''} ${isToday?'today':''}" ${walked?`data-d="${d}"`:''}>${d}</div>`;
  }
  $('calGrid').innerHTML=g;$('calList').innerHTML='';
  $('calGrid').querySelectorAll('.cal-day.walked').forEach(c=>c.onclick=()=>showDay(+c.dataset.d));
}
function showDay(d){
  const items=load().filter(e=>{const x=new Date(startOf(e));return x.getFullYear()===calY&&x.getMonth()===calM&&x.getDate()===d;}).sort((a,b)=>startOf(a)-startOf(b));
  $('calList').innerHTML=`<div class="day-head"><span class="day-date">${calM+1}/${d}</span><span class="day-wd">${WD1[new Date(calY,calM,d).getDay()]}</span></div><div class="day-entries">`+items.map(recHtml).join('')+`</div>`;
  $('calList').querySelectorAll('.rec').forEach(c=>c.onclick=()=>openDetail(c.dataset.id,false));
}

/* wire */
$('startDog').onclick=startWalk; $('pill').onclick=openTimer;
$('endWalk').onclick=endWalk; $('cancelWalk').onclick=cancelWalk;
$('back').onclick=()=>{renderHome();showView('home');};
$('save').onclick=saveDetail; $('del').onclick=delDetail;
$('share').onclick=()=>alert('分享模板还在设计中～ 现在可以先长按 / 截图保存这页 🐾');
$('placeInput').oninput=syncPlaceChips;
$('calBtn').onclick=openCal; $('calBack').onclick=()=>{renderHome();showView('home');};
$('calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();};
$('calNext').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();};
$('menu').onclick=()=>{const n=prompt('你的狗狗叫什么？',dog);if(n&&n.trim()){dog=n.trim();localStorage.setItem(DOGKEY,dog);setDog();renderHome();}};
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&getActive()&&$('timer').classList.contains('active'))updateClock();});

buildChips();setDog();renderHome();
if(getActive())openTimer();else showView('home');
</script>
